version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bridgekeeper-api
    environment:
      NODE_ENV: development
      PORT: 3000
    expose:
      - "3000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  nginx:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: bridgekeeper-nginx
    ports:
      - "8080:80"
    volumes:
      - ./logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped

volumes: {}
